<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>InfoByte AI</title>
    <style>
        body {
            font-family: Arial;
            width: 350px;
            padding: 10px;
            background: white;
            color: black;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            background: #f0f0f0;
            border: 1px solid #ccc;
            color: black;
            border-radius: 6px;
        }
        #copyBtn {
            font-size: 12px;
            width: auto;
            display: inline-block;
            padding: 6px 10px;
            margin: 10px auto 0;
        }

        #output {
            white-space: pre-wrap;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
            font-family: Calibri, Arial, sans-serif;
            text-align: justify;
        }

        #themeToggle {
            text-align: right;
            padding: 4px;
            border-radius: 6px;
        }

        body.dark-mode {
            background: #000;
            color: #fff;
        }

        body.dark-mode button {
            background: #333;
            border: 1px solid #555;
            color: #fff;
        }

        body.dark-mode #themeIcon {
            content: "☀️";
        }
    </style>
</head>

<body>
    <div id="headerContainer" style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0;">TLDR AI</h3>
        <div id="themeToggle" style="cursor:pointer; font-size:18px;">
            <span id="themeIcon">🌙</span>
        </div>
    </div>
    <div style="height:10px;"></div>

    <button id="analyzeBtn">Summarise Page</button>
    <div id="spinner" style="display:none; margin:10px auto; width:24px; height:24px; border:4px solid rgba(0,0,0,0.1); border-top:4px solid #333; border-radius:50%; animation: spin 1s linear infinite;"></div>
    <div id="output"></div>
    <button id="copyBtn" style="display:none; margin-top:10px;">Copy to Clipboard</button>

    <!-- token entry dialog -->
    <div id="tokenDialog" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:#fff; padding:20px; border-radius:8px; width:90%; max-width:300px; color:#000;">
            <p>Please enter your API token:</p>
            <input id="tokenInput" type="text" style="width:100%; padding:6px; margin-bottom:10px;" placeholder="Bearer token here" />
            <div style="display:flex; justify-content:space-between;">
                <button id="saveTokenBtn" style="flex:1; margin-right:4px;">Save</button>
                <button id="cancelTokenBtn" style="flex:1; margin-left:4px;">Cancel</button>
            </div>
            <p style="font-size:12px; margin-top:10px;">
                Don't have a key? <a id="createTokenLink" href="https://github.com/hamzakhanx9/TLDR-AI/blob/main/API_KEY.txt" target="_blank">Create one</a> and come back.
            </p>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
